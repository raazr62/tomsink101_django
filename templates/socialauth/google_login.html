<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login Test</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .login-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
        }

        #g_id_signin {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            width: 100%;
            margin: 20px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }

        .divider span {
            padding: 0 10px;
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
        }

        .response-section {
            margin-top: 30px;
            display: none;
        }

        .response-section.active {
            display: block;
        }

        .response-header {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px 10px 0 0;
            border-left: 4px solid #667eea;
        }

        .response-header h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .response-header .status {
            font-size: 12px;
            font-weight: bold;
        }

        .response-header .status.success {
            color: #10b981;
        }

        .response-header .status.error {
            color: #ef4444;
        }

        .response-body {
            background: #fafafa;
            padding: 20px;
            border-radius: 0 0 10px 10px;
            border: 1px solid #e0e0e0;
            border-top: none;
        }

        .token-item {
            margin-bottom: 15px;
        }

        .token-item label {
            display: block;
            color: #666;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .token-value {
            background: white;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #333;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.3s;
        }

        .copy-btn:hover {
            background: #5568d3;
        }

        .copy-btn:active {
            transform: scale(0.98);
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            color: #666;
            font-size: 14px;
            padding: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-box {
            background: #e0e7ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
        }

        .info-box h4 {
            color: #4338ca;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .info-box p {
            color: #4338ca;
            font-size: 12px;
            line-height: 1.5;
        }

        .info-box code {
            background: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Google Login Test</h1>
            <p>Test your Google OAuth integration</p>
        </div>

        <div class="login-section">
            <div id="g_id_onload"
                 data-client_id="{{ google_client_id }}"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-size="large"
                 data-theme="outline"
                 data-text="sign_in_with"
                 data-shape="rectangular"
                 data-logo_alignment="left"
                 data-width="300">
            </div>
        </div>

        <div class="divider">
            <span>Response</span>
        </div>

        <div id="responseSection" class="response-section">
            <div class="response-header">
                <h3>Authentication Response</h3>
                <span id="responseStatus" class="status"></span>
            </div>
            <div class="response-body">
                <div id="responseContent"></div>
            </div>
        </div>

        <div class="info-box">
            <h4>📋 API Endpoint</h4>
            <p>
                POST to <code>{{ api_endpoint }}</code><br>
                Body: <code>{ "access_token": "..." }</code>
            </p>
        </div>
    </div>

    <script>
        const API_ENDPOINT = '{{ api_endpoint }}';
        const GOOGLE_CLIENT_ID = '{{ google_client_id }}';

        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            
            // Show loading state
            showLoading();

            // Exchange the JWT credential for an access token first
            fetch('https://oauth2.googleapis.com/tokeninfo?id_token=' + response.credential)
                .then(res => res.json())
                .then(tokenInfo => {
                    console.log('Token info:', tokenInfo);
                    
                    // Now get the access token using the authorization code flow
                    // Since we have the ID token, we'll use it directly
                    // For a proper flow, you'd exchange authorization code for access token
                    
                    // For now, we'll use the Google API to get user info directly
                    return fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                        headers: {
                            'Authorization': 'Bearer ' + response.credential
                        }
                    });
                })
                .catch(error => {
                    console.log('Using ID token directly as access token');
                    // If the above fails, send the ID token directly to backend
                    return sendToBackend(response.credential);
                })
                .then(res => {
                    if (res && res.ok) {
                        return res.json();
                    } else {
                        // Fallback: send ID token to backend
                        return sendToBackend(response.credential);
                    }
                })
                .catch(error => {
                    console.error('Error in token exchange:', error);
                    // Final fallback: send ID token to backend
                    sendToBackend(response.credential);
                });
        }

        function sendToBackend(token) {
            return fetch(API_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    access_token: token
                })
            })
            .then(res => res.json())
            .then(data => {
                console.log('Backend response:', data);
                displayResponse(data, data.success !== false);
            })
            .catch(error => {
                console.error('Error:', error);
                displayResponse({
                    error: 'Failed to authenticate',
                    message: error.message
                }, false);
            });
        }

        function showLoading() {
            const responseSection = document.getElementById('responseSection');
            const responseContent = document.getElementById('responseContent');
            
            responseSection.classList.add('active');
            responseContent.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Authenticating with backend...</p>
                </div>
            `;
        }

        function displayResponse(data, isSuccess) {
            const responseSection = document.getElementById('responseSection');
            const responseStatus = document.getElementById('responseStatus');
            const responseContent = document.getElementById('responseContent');
            
            responseSection.classList.add('active');
            responseStatus.textContent = isSuccess ? 'SUCCESS' : 'ERROR';
            responseStatus.className = 'status ' + (isSuccess ? 'success' : 'error');

            if (isSuccess && data.data) {
                const tokenData = data.data;
                responseContent.innerHTML = `
                    <div class="token-item">
                        <label>Access Token (JWT)</label>
                        <div class="token-value" id="accessToken">${tokenData.access_token || 'N/A'}</div>
                        <button class="copy-btn" onclick="copyToClipboard('accessToken')">📋 Copy</button>
                    </div>
                    <div class="token-item">
                        <label>Refresh Token (JWT)</label>
                        <div class="token-value" id="refreshToken">${tokenData.refresh_token || 'N/A'}</div>
                        <button class="copy-btn" onclick="copyToClipboard('refreshToken')">📋 Copy</button>
                    </div>
                    ${data.message ? `<div style="margin-top: 15px; color: #10b981; font-size: 14px;">✓ ${data.message}</div>` : ''}
                    ${data.status ? `<div style="margin-top: 10px; color: #666; font-size: 12px;">Status Code: ${data.status}</div>` : ''}
                `;
            } else {
                responseContent.innerHTML = `
                    <div class="error-message">
                        <strong>Error:</strong> ${data.error || data.message || 'Unknown error occurred'}
                        ${data.data ? `<br><br><small>${JSON.stringify(data.data)}</small>` : ''}
                        ${data.status ? `<br><br><small>Status: ${data.status}</small>` : ''}
                    </div>
                `;
            }
        }

        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            const text = element.textContent;
            
            navigator.clipboard.writeText(text).then(() => {
                const btn = element.nextElementSibling;
                const originalText = btn.textContent;
                btn.textContent = '✓ Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        // Test API endpoint availability on page load
        window.addEventListener('load', () => {
            console.log('=== Google OAuth Configuration ===');
            console.log('Google Client ID:', GOOGLE_CLIENT_ID);
            console.log('API Endpoint:', API_ENDPOINT);
            console.log('==================================');
            
            // Test if API endpoint is reachable
            fetch(API_ENDPOINT, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({})
            })
            .then(res => res.json())
            .then(data => {
                console.log('API Test Response:', data);
            })
            .catch(err => {
                console.log('API Test Failed (expected):', err.message);
            });
        });
    </script>
</body>
</html>
